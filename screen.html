<div class="max-w-4xl mx-auto px-6 pt-24 pb-16">

  <!-- Back button -->
  <button onclick="showScreen('home')" class="text-gray-500 hover:text-white text-sm mb-6 flex items-center gap-1">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    Back
  </button>

  <!-- Header -->
  <div class="sticky top-0 z-10 bg-dark-900 border-b border-gray-800 pb-3 mb-4">
    <h2 class="text-2xl font-bold text-white mb-1">Add E-Standard Bass Arrangement</h2>
    <p class="text-gray-500 text-sm mb-3">Adds a selectable E standard Bass arrangement (E A D G) alongside the original. Audio is never modified.</p>

    <!-- Patch status strip -->
    <div id="patch-status" class="hidden"></div>

    <!-- Sort bar -->
    <div class="flex items-center gap-2 mt-2">
      <span class="text-xs text-gray-600">Sort:</span>
      <button id="sort-title" class="sort-btn px-3 py-1 rounded text-xs font-medium border border-accent bg-accent text-white transition">Title</button>
      <button id="sort-recent" class="sort-btn px-3 py-1 rounded text-xs font-medium border border-gray-700 bg-dark-700 text-gray-400 hover:text-white hover:bg-dark-600 transition">Recently Added</button>
    </div>
  </div>

  <!-- Song list -->
  <div id="song-list" class="flex flex-col gap-2">
    <div class="text-center text-gray-500 text-sm py-10">
      <svg class="inline-block w-4 h-4 mr-2 animate-spin text-accent" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
      Scanning library…
    </div>
  </div>

  <!-- Confirmation modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center">
    <div class="bg-dark-800 border border-gray-700 rounded-xl p-6 w-[480px] max-w-[95vw] max-h-[85vh] overflow-y-auto">
      <h3 class="text-base font-semibold text-white mb-1">Add E-Standard Bass Arrangement</h3>
      <div id="modal-song-label" class="text-gray-500 text-xs mb-4"></div>

      <div id="modal-info"></div>

      <div id="modal-warning" class="hidden bg-yellow-950/40 border border-yellow-800/50 rounded-lg p-3 my-4 text-sm leading-relaxed">
        <div class="text-yellow-500 font-semibold mb-1">⚠ Some notes require octave adjustment</div>
        <div id="modal-warning-body" class="text-gray-300"></div>
        <div id="modal-note-list" class="mt-2 font-mono text-xs text-gray-500 max-h-20 overflow-y-auto"></div>
      </div>

      <div class="flex gap-2 justify-end mt-5">
        <button id="modal-cancel" class="px-4 py-2 rounded-lg text-sm font-medium bg-dark-700 border border-gray-700 text-gray-300 hover:bg-dark-600 transition">Cancel</button>
        <button id="modal-confirm" class="px-4 py-2 rounded-lg text-sm font-medium bg-accent hover:bg-accent/80 text-white transition disabled:bg-dark-600 disabled:text-gray-600 disabled:cursor-not-allowed">Add E-Std Arrangement</button>
      </div>
      <div id="modal-status" class="text-xs text-gray-500 mt-3 min-h-[18px]"></div>
    </div>
  </div>

</div>
